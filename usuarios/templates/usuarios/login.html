{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión - Valerianos</title>
    <link rel="stylesheet" href="{% static 'catalogo/css/estilos.css' %}?v=2">
</head>
<body>
    <div class="auth-wrapper">
        <!-- Lado Izquierdo: Formulario -->
        <div class="auth-left">
            <br>
            <a href="{% url 'catalogo:tienda' %}" class="logo" style="margin-bottom: 40px;">Valerianos.</a>
            <div class="auth-form">
                <h2>Bienvenido de nuevo</h2>
                <p>Ingresa a tu cuenta para continuar con tus pedidos dulces.</p>
                
                <form method="POST">
                    {% csrf_token %}
                    {{ form.as_p }} <!-- Django renderiza los inputs aquí -->
                    <button type="submit" class="btn-primary btn-block" style="margin-top: 15px;">Iniciar Sesión</button>
                </form>
                
                <div class="auth-links">
                    ¿No tienes una cuenta? <a href="{% url 'usuarios:registro' %}">Regístrate aquí</a>
                </div>
            </div>
        </div>
        
        <!-- Lado Derecho: Imagen con transparencia -->
        <div class="auth-right">
            <img style="width: 100%; height: 100%; object-fit: cover;" src="https://images.unsplash.com/photo-1621236378699-8597faf6a176?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" alt="Postre de fondo">
        </div>
    </div>
</body>
</html>
